<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestione Offerta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <h1 th:text="${specialOffer.id == null} ? 'Nuova Offerta' : 'Modifica Offerta'"></h1>

    <form th:action="@{/offers/save}" th:object="${specialOffer}" method="POST">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{pizza}">

        <div class="mb-3">
            <label class="form-label">Titolo Offerta</label>
            <input type="text" th:field="*{title}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Data Inizio</label>
            <input type="date" th:field="*{startDate}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Data Fine</label>
            <input type="date" th:field="*{endDate}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
        </div>

        <button type="submit" class="btn btn-success">Salva</button>
        <a th:href="@{/pizze/{id}(id=*{pizza.id})}" class="btn btn-secondary">Annulla</a>
    </form>
</body>

</html>
