<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Modifica Pizza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <nav th:replace="~{fragments/navbar :: main-navbar}"></nav>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4">Modifica Pizza: <span th:text="${pizza.name}"></span></h1>

            <form th:action="@{/pizze/edit/{id}(id=${pizza.id})}" th:object="${pizza}" method="POST"
                class="card p-4 shadow-sm">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="name" class="form-label">Nome della Pizza</label>
                    <input type="text" th:field="*{name}" class="form-control"
                        th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Descrizione</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"
                        th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                        th:errors="*{description}"></div>
                </div>

                <div class="mb-3">
                    <label for="urlImmagine" class="form-label">URL Foto</label>
                    <input type="text" th:field="*{urlImmagine}" class="form-control"
                        th:classappend="${#fields.hasErrors('urlImmagine')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('urlImmagine')}"
                        th:errors="*{urlImmagine}"></div>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label">Prezzo (€)</label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control"
                        th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-warning">Aggiorna Pizza</button>
                    <a th:href="@{/pizze}" class="btn btn-outline-secondary">Annulla</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
