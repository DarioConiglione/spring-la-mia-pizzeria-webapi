<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestione Ingredienti</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <nav th:replace="~{fragments/navbar :: main-navbar}"></nav>

    <h1>Gestione Ingredienti</h1>

    <div class="row mt-4">
        <div class="col-md-6">
            <h3>Lista Ingredienti</h3>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ing : ${ingredients}">
                        <td th:text="${ing.id}"></td>
                        <td th:text="${ing.name}"></td>
                        <td>
                            <form th:action="@{/ingredients/delete/{id}(id=${ing.id})}" method="POST">
                                <button type="submit" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Vuoi eliminare questo ingrediente?')">Elimina</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="col-md-6">
            <h3>Aggiungi Nuovo</h3>
            <form th:action="@{/ingredients/save}" th:object="${newIngredient}" method="POST" class="card p-3">
                <div class="mb-3">
                    <label class="form-label">Nome Ingrediente</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="es. Basilico">
                    <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <button type="submit" class="btn btn-success">Salva Ingrediente</button>
            </form>
        </div>
    </div>
</body>

</html>
